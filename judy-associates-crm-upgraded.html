  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; }

    /* ── MOBILE NAV ── */
    .mobile-nav { display:none; }
    .mobile-bottom-nav { display:none; }
    .desktop-search { display:flex; }

    @media (max-width: 768px) {
      .desktop-search { display:none !important; }
      .desktop-nav { display:none !important; }
      .desktop-user { display:none !important; }
      .mobile-hamburger { display:flex !important; }
      .mobile-bottom-nav {
        display:flex !important;
        position:fixed; bottom:0; left:0; right:0;
        background:#0a1628; border-top:1px solid #243050;
        z-index:500; height:60px;
        justify-content:space-around; align-items:center;
      }
      .mobile-bottom-nav button {
        display:flex; flex-direction:column; align-items:center;
        background:none; border:none; color:#aab4c4;
        cursor:pointer; font-family:inherit; font-size:10px;
        gap:3px; padding:6px 12px; border-radius:8px; flex:1;
      }
      .mobile-bottom-nav button.active { color:#c8a96e; }
      .mobile-bottom-nav button span.icon { font-size:20px; }
      .main-content { padding-bottom:70px !important; }
      .page-pad { padding:16px !important; }
      .cards-grid { grid-template-columns: 1fr !important; }
      .stat-grid { grid-template-columns: 1fr 1fr !important; }
      .dash-grid { grid-template-columns: 1fr !important; }
      .case-detail-grid { grid-template-columns: 1fr 1fr !important; }
      .form-2col { grid-template-columns: 1fr !important; }
      .form-3col { grid-template-columns: 1fr 1fr !important; }
      .modal-inner { padding:16px !important; }
      .modal-wrap { padding:8px !important; }
      .case-actions { flex-direction:row !important; flex-wrap:wrap !important; }
      .case-actions button { flex:1; min-width:80px; font-size:12px !important; padding:7px 8px !important; }
      .top-bar { flex-direction:column !important; align-items:flex-start !important; gap:10px !important; }
      .top-bar-right { width:100%; }
      .top-bar-right input { width:100% !important; }
      .report-grid { grid-template-columns: 1fr !important; }
      .report-actions { flex-direction:column !important; }
    }
    @media (max-width: 480px) {
      .stat-grid { grid-template-columns: 1fr !important; }
      .form-2col { grid-template-columns: 1fr !important; }
      .form-3col { grid-template-columns: 1fr !important; }

function Badge({ label, map }) {
  const s = (map&&map[label]) || { bg:"#eee", color:"#555", border:"#ddd" };
  return <span style={{ background:s.bg, color:s.color, border:`1px solid ${s.border||s.bg}`, borderRadius:20, padding:"3px 12px", fontSize:12, fontWeight:700, whiteSpace:"nowrap", display:"inline-flex", alignItems:"center", gap:5 }}>
    {s.dot && <span style={{ width:6, height:6, borderRadius:"50%", background:s.dot, flexShrink:0 }} />}{label}
  </span>;
}

function Modal({ children, onClose, wide }) {
  return (
    <div style={{ position:"fixed", inset:0, zIndex:9000, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div onClick={onClose} style={{ position:"absolute", inset:0, background:"rgba(6,16,31,0.65)" }} />
      <div style={{ position:"relative", zIndex:1, background:"#fff", borderRadius:20, width:"100%", maxWidth:wide?860:640, maxHeight:"93vh", overflowY:"auto", boxShadow:"0 32px 80px rgba(0,0,0,0.4)" }}>
        {children}
      </div>
    </div>
  );
}

function Confirm({ title, message, confirmLabel, confirmColor, onConfirm, onCancel }) {
  return (
    <Modal onClose={onCancel}>
      <div style={{ padding:36, textAlign:"center" }}>
        <div style={{ fontSize:44, marginBottom:16 }}>{confirmColor==="#c62828"?"🔒":"🔓"}</div>
        <h3 style={{ fontFamily:"Georgia,serif", fontSize:20, color:"#0a1628", margin:"0 0 10px" }}>{title}</h3>
        <p style={{ color:"#666", fontSize:14, lineHeight:1.6, margin:"0 0 28px" }}>{message}</p>
        <div style={{ display:"flex", gap:12, justifyContent:"center" }}>
          <button onClick={onCancel} style={{ padding:"11px 26px", borderRadius:10, border:"1.5px solid #dde", background:"#fff", cursor:"pointer", fontWeight:600, fontSize:14, fontFamily:"inherit" }}>Cancel</button>
          <button onClick={onConfirm} style={{ padding:"11px 26px", borderRadius:10, border:"none", background:confirmColor, color:"#fff", cursor:"pointer", fontWeight:700, fontSize:14, fontFamily:"inherit" }}>{confirmLabel}</button>
        </div>
      </div>
    </Modal>
  );
}

function Login({ onLogin }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [showPw,   setShowPw]   = useState(false);
  const [error,    setError]    = useState("");
  const [loading,  setLoading]  = useState(false);

  const attempt = () => {
    if (!username||!password) return;
    setError(""); setLoading(true);
    setTimeout(() => {
      const u = USERS.find(u=>u.username===username.trim().toLowerCase()&&u.password===password);
      if (u) { onLogin(u); } else { setError("Invalid username or password."); setPassword(""); }
      setLoading(false);
    }, 600);
  };

  return (
    <div style={{ minHeight:"100vh", background:"#06101f", display:"flex", alignItems:"center", justifyContent:"center", padding:16, fontFamily:"'Segoe UI',sans-serif" }}>
      <div style={{ display:"flex", width:"100%", maxWidth:860, borderRadius:22, overflow:"hidden", boxShadow:"0 40px 100px rgba(0,0,0,0.6)" }}>
        <div style={{ flex:1, background:"linear-gradient(160deg,#0a1628,#0d1f3c)", padding:50, display:"flex", flexDirection:"column", justifyContent:"space-between" }}>
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:44 }}>
              <div style={{ width:46, height:46, background:"linear-gradient(135deg,#c8a96e,#a07840)", borderRadius:13, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>⚖️</div>
              <div>
                <div style={{ fontFamily:"Georgia,serif", fontSize:19, color:"#fff", fontWeight:700 }}>Judy & Associates</div>
                <div style={{ fontSize:10, color:"#c8a96e", letterSpacing:2, textTransform:"uppercase" }}>Advocates · Nairobi</div>
              </div>
            </div>
            <h1 style={{ fontFamily:"Georgia,serif", fontSize:32, color:"#fff", margin:"0 0 14px", lineHeight:1.25 }}>Case Management<br /><span style={{ color:"#c8a96e" }}>Portal</span></h1>
            <p style={{ color:"#6a80a0", fontSize:14, lineHeight:1.7, margin:0 }}>Secure access to client records, case files, hearing schedules and legal documents.</p>
          </div>
          <div>
            {[["📁","Case & Client Records"],["📅","Hearing Schedules"],["📝","Case Notes & Documents"],["👥","Team Management"]].map(([i,l])=>(
              <div key={l} style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>
                <div style={{ width:30, height:30, background:"rgba(200,169,110,0.1)", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>{i}</div>
                <span style={{ color:"#8a9ab5", fontSize:13 }}>{l}</span>
              </div>
            ))}
            <p style={{ color:"#2a3f5a", fontSize:11, marginTop:20 }}>🔒 Authorised personnel only. All access is logged.<br />© {new Date().getFullYear()} Judy & Associates Advocates.</p>
          </div>
        </div>
        <div style={{ width:370, background:"#fff", padding:48, display:"flex", flexDirection:"column", justifyContent:"center" }}>
          <h2 style={{ fontFamily:"Georgia,serif", fontSize:26, color:"#0a1628", margin:"0 0 6px" }}>Sign In</h2>
          <p style={{ color:"#888", fontSize:14, margin:"0 0 28px" }}>Enter your credentials to continue</p>
          <label style={lStyle}>Username</label>
          <input value={username} onChange={e=>{setUsername(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&attempt()}
            placeholder="e.g. judy.mwangi" style={{ ...iStyle, marginBottom:16, borderColor:error?"#e53935":"#dde3f0" }} />
          <label style={lStyle}>Password</label>
          <div style={{ position:"relative", marginBottom:error?10:22 }}>
            <input type={showPw?"text":"password"} value={password} onChange={e=>{setPassword(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&attempt()}
              placeholder="••••••••" style={{ ...iStyle, paddingRight:44, borderColor:error?"#e53935":"#dde3f0" }} />
            <button onClick={()=>setShowPw(s=>!s)} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", fontSize:16, color:"#aaa", padding:0 }}>{showPw?"🙈":"👁️"}</button>
          </div>
          {error && <div style={{ background:"#ffebee", border:"1px solid #ffcdd2", borderRadius:8, padding:"9px 13px", marginBottom:14, fontSize:13, color:"#c62828" }}>⚠️ {error}</div>}
          <button onClick={attempt} disabled={loading||!username||!password}
            style={{ width:"100%", padding:14, background:loading?"#8a9ab5":"#0a1628", color:"#fff", border:"none", borderRadius:11, fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:"inherit", marginBottom:26 }}>
            {loading?"Signing in…":"Sign In →"}
          </button>
          <div style={{ background:"#f7f9fc", borderRadius:12, padding:14, border:"1px solid #eef0f5" }}>
            <div style={{ fontSize:11, fontWeight:700, color:"#888", textTransform:"uppercase", letterSpacing:0.5, marginBottom:8 }}>Demo Credentials (click to fill)</div>
            {USERS.map(u=>(
              <div key={u.id} onClick={()=>{setUsername(u.username);setPassword(u.password);setError("");}}
                style={{ display:"flex", justifyContent:"space-between", padding:"5px 8px", borderRadius:7, cursor:"pointer", marginBottom:2 }}
                onMouseEnter={e=>e.currentTarget.style.background="#eef2ff"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span style={{ fontSize:12, color:"#333", fontWeight:600, fontFamily:"monospace" }}>{u.username}</span>
                <span style={{ fontSize:11, color:"#aaa" }}>{u.role}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

  const submit = () => {
    if (!f.title.trim()) { alert("Please enter a Case Title."); return; }
    if (!f.clientId)     { alert("Please select a Client."); return; }

    <div>

        <div style={{ marginBottom:14 }}>

          <div><label style={lStyle}>Client *</label>
            <select style={iStyle} value={f.clientId} onChange={e=>set("clientId",e.target.value)}>
              {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select></div>
          <div><label style={lStyle}>Practice Area</label>
            <select style={iStyle} value={f.type} onChange={e=>set("type",e.target.value)}>

              {["High","Medium","Low"].map(p=><option key={p} value={p}>{p}</option>)}

        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14, marginBottom:14 }}>
          <div><label style={lStyle}>Status</label>
            <select style={iStyle} value={f.status} onChange={e=>set("status",e.target.value)}>
              {["Active","On Hold","Completed","Closed"].map(s=><option key={s} value={s}>{s}</option>)}

          confirmLabel={isActive ? "Yes, Close Case" : "Yes, Re-open Case"}
          confirmColor={isActive ? "#880e4f" : "#1e7e34"}
          onConfirm={()=>{ onToggleStatus(c.id, isActive); setConfirm(false); onClose(); }}
          onCancel={()=>setConfirm(false)}
        />
      )}
    </>
  );

function CasesTab({ cases, setCases, clients, globalSearch }) {
  const [showForm, setShowForm] = useState(false);
  const [editing,  setEditing]  = useState(null);
  const [viewing,  setViewing]  = useState(null);
  const [statusF,  setStatusF]  = useState("All");
  const [localQ,   setLocalQ]   = useState("");

  const q = (localQ||globalSearch).toLowerCase();
  const filtered = cases.filter(c => {
    const cl = clients.find(x=>x.id===c.clientId);
    const ok = !q || c.title.toLowerCase().includes(q) || c.id.toLowerCase().includes(q) || (cl?.name||"").toLowerCase().includes(q) || c.type.toLowerCase().includes(q) || (c.assignedTo||"").toLowerCase().includes(q);
    return ok && (statusF==="All"||c.status===statusF);
  });

  const nextId = () => {
    const yr  = new Date().getFullYear();
    const max = cases.filter(c=>c.id.startsWith(`JA/${yr}/`)).map(c=>parseInt(c.id.split("/")[2])||0).reduce((a,b)=>Math.max(a,b),0);
    return `JA/${yr}/${String(max+1).padStart(3,"0")}`;
  };

  const saveCase = form => {
    if (editing) { setCases(cs=>cs.map(c=>c.id===editing.id?{...c,...form,id:c.id,notes:c.notes}:c)); }
    else          { setCases(cs=>[...cs,{...form,id:nextId(),notes:[]}]); }
  };

  const toggleStatus = (id, wasActive) => {
    const today = new Date().toISOString().split("T")[0];
    setCases(cs=>cs.map(c=>c.id===id ? { ...c, status: wasActive?"Closed":"Active", closedDate: wasActive?today:"", nextHearing: wasActive?"":c.nextHearing } : c));
  };

  const openNew  = () => { setEditing(null); setViewing(null); setShowForm(true); };
  const openEdit = (c) => { setEditing(c);   setViewing(null); setShowForm(true); };

  return (
    <div style={{ padding:28 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, gap:12, flexWrap:"wrap" }}>
        <div>
          <h2 style={{ fontFamily:"Georgia,serif", fontSize:22, color:"#0a1628", margin:0 }}>Cases</h2>
          <p style={{ color:"#888", fontSize:13, margin:"3px 0 0" }}>{filtered.length} of {cases.length} record{cases.length!==1?"s":""}</p>
        </div>
        <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
          <input value={localQ} onChange={e=>setLocalQ(e.target.value)} placeholder="Search cases…" style={{ ...iStyle, width:200, padding:"8px 13px" }} />
          <select value={statusF} onChange={e=>setStatusF(e.target.value)} style={{ ...iStyle, width:"auto", padding:"8px 13px" }}>
            {["All","Active","On Hold","Completed","Closed"].map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          <button onClick={openNew} style={{ padding:"9px 20px", background:"#0a1628", color:"#fff", border:"none", borderRadius:10, fontWeight:700, cursor:"pointer", fontSize:14, whiteSpace:"nowrap", fontFamily:"inherit" }}>+ Open Case</button>
        </div>
      </div>
      {filtered.length===0
        ? <div style={{ textAlign:"center", padding:70, color:"#bbb", fontSize:14 }}>No cases found. Try adjusting your search or filter.</div>
        : <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {filtered.map(c=>{
              const cl = clients.find(x=>x.id===c.clientId);
              const sm = STATUS_META[c.status] || STATUS_META["Active"];
              const isActive = c.status==="Active"||c.status==="On Hold";
              return (
                <div key={c.id} style={{ background:"#fff", borderRadius:14, boxShadow:"0 2px 8px rgba(0,0,0,0.06)", border:"1px solid #eef0f5", overflow:"hidden" }}
                  onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 20px rgba(0,0,0,0.1)"}
                  onMouseLeave={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.06)"}>
                  <div style={{ height:4, background:sm.dot }} />
                  <div style={{ padding:"16px 20px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12 }}>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6, flexWrap:"wrap" }}>
                          <span style={{ fontFamily:"monospace", fontSize:11, fontWeight:700, color:"#c8a96e", background:"#fff8e6", border:"1px solid #f0dfa0", borderRadius:5, padding:"1px 8px" }}>{c.id}</span>
                          <span style={{ fontSize:14 }}>{TYPE_ICONS[c.type]||"⚖️"}</span>
                          <span style={{ fontSize:12, color:"#888" }}>{c.type}</span>
                          <Badge label={c.status} map={STATUS_META} />
                          <Badge label={c.priority} map={PRIORITY_META} />
                        </div>
                        <h3 style={{ margin:"0 0 8px", fontSize:16, fontWeight:700, color:"#0a1628", lineHeight:1.3 }}>{c.title}</h3>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:"6px 20px", fontSize:12, color:"#777", marginBottom:10 }}>
                          <span>👤 <strong style={{ color:"#333" }}>{cl?.name||"—"}</strong></span>
                          <span>👩‍⚖️ <strong style={{ color:"#333" }}>{c.assignedTo}</strong></span>
                          {c.court!=="N/A" && <span>🏛️ {c.court}</span>}
                          {c.fileNo && c.fileNo!=="N/A" && <span>📄 {c.fileNo}</span>}
                          {c.nextHearing && <span>🔔 <strong style={{ color:"#a07840" }}>Next hearing: {c.nextHearing}</strong></span>}
                          {c.closedDate  && <span>🔒 Closed: {c.closedDate}</span>}
                        </div>
                        {c.description && <p style={{ margin:0, fontSize:13, color:"#666", lineHeight:1.6, overflow:"hidden", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>{c.description}</p>}
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", gap:8, flexShrink:0 }}>
                        <button onClick={()=>setViewing(c)} style={{ padding:"8px 18px", background:"#0a1628", color:"#fff", border:"none", borderRadius:9, cursor:"pointer", fontWeight:700, fontSize:13, fontFamily:"inherit", whiteSpace:"nowrap" }}>View Details</button>
                        <button onClick={()=>openEdit(c)} style={{ padding:"8px 18px", background:"#f3f4f6", color:"#444", border:"1px solid #e5e7eb", borderRadius:9, cursor:"pointer", fontWeight:600, fontSize:13, fontFamily:"inherit" }}>✏️ Edit</button>
                        {isActive
                          ? <button onClick={()=>{ if(window.confirm(`Close case "${c.title}"?`)) { const today=new Date().toISOString().split("T")[0]; setCases(cs=>cs.map(x=>x.id===c.id?{...x,status:"Closed",closedDate:today,nextHearing:""}:x)); } }} style={{ padding:"8px 18px", background:"#fce4ec", color:"#880e4f", border:"1.5px solid #f48fb1", borderRadius:9, cursor:"pointer", fontWeight:700, fontSize:13, fontFamily:"inherit" }}>🔒 Close</button>
                          : <button onClick={()=>{ if(window.confirm(`Re-open case "${c.title}"?`)) { setCases(cs=>cs.map(x=>x.id===c.id?{...x,status:"Active",closedDate:""}:x)); } }} style={{ padding:"8px 18px", background:"#e8f5e9", color:"#1e7e34", border:"1.5px solid #a5d6a7", borderRadius:9, cursor:"pointer", fontWeight:700, fontSize:13, fontFamily:"inherit" }}>🔓 Re-open</button>}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>}
      {showForm && <Modal onClose={()=>setShowForm(false)}><CaseForm clients={clients} initial={editing} onSave={saveCase} onClose={()=>setShowForm(false)} /></Modal>}
      {viewing && !showForm && (
        <Modal onClose={()=>setViewing(null)} wide>
          <CaseDetail c={viewing} client={clients.find(x=>x.id===viewing.clientId)} onClose={()=>setViewing(null)} onEdit={()=>openEdit(viewing)} onToggleStatus={toggleStatus} />
        </Modal>
      )}
    </div>
  );
}

function ClientForm({ initial, onSave, onClose }) {
  const blank = { name:"", phone:"", email:"", idNumber:"", address:"", type:"Individual", status:"Active" };
  const [f, setF] = useState(initial ? { ...blank, ...initial } : blank);
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const submit = () => {
    if (!f.name.trim()) { alert("Please enter a client name."); return; }
    onSave({ ...f }); onClose();
  };
  return (
    <div>
      <div style={{ background:"#0a1628", padding:"18px 24px", borderRadius:"20px 20px 0 0", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <h3 style={{ margin:0, color:"#fff", fontFamily:"Georgia,serif", fontSize:18 }}>{initial?"Edit Client":"Add New Client"}</h3>
        <button onClick={onClose} style={{ background:"none", border:"none", color:"#fff", fontSize:24, cursor:"pointer", lineHeight:1, padding:0 }}>×</button>
      </div>
      <div style={{ padding:24 }}>
        <div style={{ marginBottom:14 }}>
          <label style={lStyle}>Full Name / Company Name *</label>
          <input style={iStyle} value={f.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. James Kamau Njoroge" />
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>
          <div><label style={lStyle}>Client Type</label>
            <select style={iStyle} value={f.type} onChange={e=>set("type",e.target.value)}>
              {["Individual","Corporate","Government","NGO"].map(t=><option key={t} value={t}>{t}</option>)}
            </select></div>
          <div><label style={lStyle}>Status</label>
            <select style={iStyle} value={f.status} onChange={e=>set("status",e.target.value)}>
              {["Active","Inactive"].map(s=><option key={s} value={s}>{s}</option>)}
            </select></div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>
          <div><label style={lStyle}>Phone Number</label>
            <input style={iStyle} value={f.phone} onChange={e=>set("phone",e.target.value)} placeholder="0722 000 000" /></div>
          <div><label style={lStyle}>Email Address</label>
            <input style={iStyle} value={f.email} onChange={e=>set("email",e.target.value)} placeholder="email@domain.com" /></div>
        </div>
        <div style={{ marginBottom:14 }}>
          <label style={lStyle}>ID / Company Reg. No.</label>
          <input style={iStyle} value={f.idNumber} onChange={e=>set("idNumber",e.target.value)} placeholder="National ID or CPR No." />
        </div>
        <div style={{ marginBottom:20 }}>
          <label style={lStyle}>Physical Address</label>
          <input style={iStyle} value={f.address} onChange={e=>set("address",e.target.value)} placeholder="Estate, Nairobi" />

        <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
          <button onClick={onClose} style={{ padding:"10px 20px", borderRadius:9, border:"1.5px solid #dde", background:"#fff", cursor:"pointer", fontWeight:600, fontSize:14, fontFamily:"inherit" }}>Cancel</button>
          <button onClick={submit}  style={{ padding:"10px 26px", borderRadius:9, border:"none", background:"#0a1628", color:"#fff", cursor:"pointer", fontWeight:700, fontSize:14, fontFamily:"inherit" }}>{initial?"Save Changes":"Add Client"}</button>
        </div>
      </div>
    </div>
  );
}

function ClientsTab({ clients, setClients, cases, globalSearch }) {
  const [showForm, setShowForm] = useState(false);
  const [editing,  setEditing]  = useState(null);
  const [localQ,   setLocalQ]   = useState("");

  const q = (localQ||globalSearch).toLowerCase();
  const filtered = clients.filter(c =>
    !q || c.name.toLowerCase().includes(q) || (c.email||"").toLowerCase().includes(q) ||
    (c.phone||"").includes(q) || (c.idNumber||"").toLowerCase().includes(q) ||
    (c.type||"").toLowerCase().includes(q) || (c.address||"").toLowerCase().includes(q)
  );

  const nextId = () => {
    const max = clients.map(c=>parseInt(c.id.replace("C",""))||0).reduce((a,b)=>Math.max(a,b),0);
    return `C${String(max+1).padStart(3,"0")}`;
  };

  const saveClient = form => {
    if (editing) { setClients(cs=>cs.map(c=>c.id===editing.id?{...c,...form}:c)); }
    else          { setClients(cs=>[...cs,{...form,id:nextId(),createdAt:new Date().toISOString().split("T")[0]}]); }
  };

  return (
    <div style={{ padding:28 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, gap:12, flexWrap:"wrap" }}>
        <div>
          <h2 style={{ fontFamily:"Georgia,serif", fontSize:22, color:"#0a1628", margin:0 }}>Clients</h2>
          <p style={{ color:"#888", fontSize:13, margin:"3px 0 0" }}>{filtered.length} record{filtered.length!==1?"s":""}</p>
        </div>
        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
          <input value={localQ} onChange={e=>setLocalQ(e.target.value)} placeholder="Search by name, phone, ID…" style={{ ...iStyle, width:230, padding:"8px 13px" }} />
          <button onClick={()=>{setEditing(null);setShowForm(true);}} style={{ padding:"9px 20px", background:"#0a1628", color:"#fff", border:"none", borderRadius:10, fontWeight:700, cursor:"pointer", fontSize:14, whiteSpace:"nowrap", fontFamily:"inherit" }}>+ Add Client</button>
        </div>
      </div>
      {filtered.length===0
        ? <div style={{ textAlign:"center", padding:60, color:"#bbb", fontSize:14 }}>No clients found{q?` matching "${q}"`:""}.</div>
        : <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:16 }}>
            {filtered.map(c=>{
              const cc = cases.filter(x=>x.clientId===c.id);
              const ac = cc.filter(x=>x.status==="Active").length;
              return (
                <div key={c.id} style={{ background:"#fff", borderRadius:14, boxShadow:"0 2px 12px rgba(0,0,0,0.07)", overflow:"hidden", border:"1px solid #f0f0f0" }}>
                  <div style={{ background:"linear-gradient(135deg,#0a1628,#162544)", padding:"15px 19px", display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                    <div>
                      <div style={{ fontSize:10, color:"#c8a96e", letterSpacing:1, marginBottom:3 }}>{c.id} · {c.type}</div>
                      <div style={{ fontFamily:"Georgia,serif", fontSize:15, color:"#fff", fontWeight:700 }}>{c.name}</div>
                    </div>
                    <span style={{ background:c.status==="Active"?"#e8f5e9":"#f3f3f3", color:c.status==="Active"?"#2e7d32":"#888", borderRadius:20, padding:"2px 9px", fontSize:11, fontWeight:700, flexShrink:0, marginTop:2 }}>{c.status}</span>
                  </div>
                  <div style={{ padding:"13px 19px" }}>
                    {[["📞",c.phone],["✉️",c.email],["🪪",c.idNumber],["📍",c.address]].map(([icon,val])=>val&&(
                      <div key={icon} style={{ display:"flex", gap:8, marginBottom:6, fontSize:13, color:"#555", alignItems:"flex-start" }}>
                        <span style={{ flexShrink:0 }}>{icon}</span><span style={{ wordBreak:"break-all" }}>{val}</span>
                      </div>
                    ))}
                    <div style={{ marginTop:12, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div style={{ fontSize:12, color:"#888" }}>📁 {cc.length} case{cc.length!==1?"s":""} · <span style={{ color:"#e53935", fontWeight:700 }}>{ac} active</span></div>
                      <button onClick={()=>{setEditing(c);setShowForm(true);}} style={{ padding:"5px 13px", background:"#f3f4f6", border:"1px solid #e5e7eb", borderRadius:8, cursor:"pointer", color:"#0a1628", fontWeight:600, fontSize:12, fontFamily:"inherit" }}>Edit</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>}
      {showForm && <Modal onClose={()=>setShowForm(false)}><ClientForm initial={editing} onSave={saveClient} onClose={()=>setShowForm(false)} /></Modal>}
    </div>
  );
}


// ─── WHATSAPP TAB ─────────────────────────────────────────────────────────────
function WhatsAppTab({ clients, cases }) {
  const [selected, setSelected] = useState(null);
  const [msgType,  setMsgType]  = useState("custom");
  const [message,  setMessage]  = useState("");
  const [localQ,   setLocalQ]   = useState("");
  const [sent,     setSent]     = useState([]);

  const filtered = clients.filter(c =>
    !localQ || c.name.toLowerCase().includes(localQ.toLowerCase()) ||
    (c.phone||"").includes(localQ)
  );

  const templates = {
    hearing:  c => {
      const ac = cases.filter(x=>x.clientId===c.id&&x.nextHearing);
      if (!ac.length) return "";
      return `Dear ${c.name},\n\nThis is a reminder from Judy & Associates Advocates.\n\nYour case *${ac[0].title}* (Ref: ${ac[0].id}) has a hearing scheduled on *${ac[0].nextHearing}* at ${ac[0].court}.\n\nKindly ensure you avail yourself on time. Please bring any relevant documents.\n\nFor any queries, do not hesitate to contact our office.\n\nRegards,\nJudy & Associates Advocates\nNairobi, Kenya`;
    },
    update:   c => `Dear ${c.name},\n\nWe write to update you on the progress of your matter with Judy & Associates Advocates.\n\nYour file is currently under active review by our team. We will revert with a comprehensive update shortly.\n\nShould you have any urgent concerns, please do not hesitate to reach us.\n\nWarm regards,\nJudy & Associates Advocates`,
    docs:     c => `Dear ${c.name},\n\nKindly note that we require the following documents to progress your matter:\n\n• National ID / Passport copy\n• Relevant contracts or agreements\n• Any court documents in your possession\n\nPlease forward these at your earliest convenience either physically to our offices or via this WhatsApp.\n\nThank you,\nJudy & Associates Advocates`,
    payment:  c => `Dear ${c.name},\n\nThis is a gentle reminder from Judy & Associates Advocates regarding outstanding professional fees on your file.\n\nKindly arrange payment at your earliest convenience to avoid any interruption in the conduct of your matter.\n\nPayment can be made via M-Pesa or bank transfer. Please contact our accounts office for payment details.\n\nThank you for your continued trust in our services.\n\nRegards,\nJudy & Associates Advocates`,
    custom:   () => message,
  };

  const selectClient = (c) => {
    setSelected(c);
    setMsgType("custom");
    setMessage("");
  };

  const getMsg = () => {
    if (msgType === "custom") return message;
    return templates[msgType](selected) || "";
  };

  const cleanPhone = (phone) => {
    if (!phone) return "";
    let p = phone.replace(/s+/g,"");
    if (p.startsWith("0")) p = "254" + p.slice(1);
    if (p.startsWith("+")) p = p.slice(1);
    return p;
  };

  const openWhatsApp = () => {
    if (!selected || !getMsg().trim()) return;
    const phone = cleanPhone(selected.phone);
    const text = encodeURIComponent(getMsg());
    window.open(`https://wa.me/${phone}?text=${text}`, "_blank");
    setSent(s=>[{ clientId:selected.id, name:selected.name, phone:selected.phone, msg:getMsg(), time:new Date().toLocaleTimeString("en-KE",{hour:"2-digit",minute:"2-digit"}), date:new Date().toLocaleDateString("en-KE",{day:"numeric",month:"short",year:"numeric"}) }, ...s].slice(0,50));
  };

  return (
    <div className="page-pad" style={{ padding:28 }}>
      <div style={{ marginBottom:20 }}>
        <h2 style={{ fontFamily:"Georgia,serif", fontSize:22, color:"#0a1628", margin:0 }}>💬 WhatsApp Client Messaging</h2>
        <p style={{ color:"#888", fontSize:13, margin:"4px 0 0" }}>Send messages directly to clients via WhatsApp</p>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"320px 1fr", gap:20 }} className="report-grid">
        {/* Client list */}
        <div style={{ background:"#fff", borderRadius:14, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", overflow:"hidden", border:"1px solid #eef0f5", display:"flex", flexDirection:"column", maxHeight:600 }}>
          <div style={{ padding:"14px 16px", borderBottom:"1px solid #eef0f5", background:"#f7f9fc" }}>
            <input value={localQ} onChange={e=>setLocalQ(e.target.value)} placeholder="Search clients…"
              style={{ ...iStyle, padding:"8px 12px", fontSize:13 }} />
          </div>
          <div style={{ overflowY:"auto", flex:1 }}>
            {filtered.map(c=>(
              <div key={c.id} onClick={()=>selectClient(c)}
                style={{ padding:"12px 16px", borderBottom:"1px solid #f5f5f5", cursor:"pointer", background:selected?.id===c.id?"#e8f4fd":"#fff", display:"flex", alignItems:"center", gap:12 }}
                onMouseEnter={e=>{ if(selected?.id!==c.id) e.currentTarget.style.background="#f9fafb"; }}
                onMouseLeave={e=>{ if(selected?.id!==c.id) e.currentTarget.style.background="#fff"; }}>
                <div style={{ width:36, height:36, borderRadius:"50%", background:"#0a1628", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:800, color:"#c8a96e", flexShrink:0 }}>
                  {c.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
                </div>
                <div style={{ minWidth:0 }}>
                  <div style={{ fontWeight:600, fontSize:13, color:"#0a1628", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{c.name}</div>
                  <div style={{ fontSize:11, color:"#888" }}>{c.phone||"No phone"}</div>
                </div>
                {c.phone && <span style={{ marginLeft:"auto", flexShrink:0, fontSize:18 }}>📱</span>}
              </div>
            ))}
          </div>
        </div>

        {/* Message composer */}
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          {selected ? (
            <>
              <div style={{ background:"#fff", borderRadius:14, padding:20, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #eef0f5" }}>
                <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:18, paddingBottom:14, borderBottom:"1px solid #f0f0f0" }}>
                  <div style={{ width:46, height:46, borderRadius:"50%", background:"#0a1628", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, fontWeight:800, color:"#c8a96e" }}>
                    {selected.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
                  </div>
                  <div>
                    <div style={{ fontFamily:"Georgia,serif", fontSize:17, fontWeight:700, color:"#0a1628" }}>{selected.name}</div>
                    <div style={{ fontSize:12, color:"#888" }}>📱 {selected.phone||"No phone on file"} · {selected.type}</div>
                  </div>
                  <div style={{ marginLeft:"auto" }}>
                    {selected.phone
                      ? <span style={{ background:"#e8f5e9", color:"#2e7d32", padding:"4px 12px", borderRadius:20, fontSize:12, fontWeight:700 }}>✓ WhatsApp Ready</span>
                      : <span style={{ background:"#fff8e1", color:"#f57f17", padding:"4px 12px", borderRadius:20, fontSize:12, fontWeight:700 }}>⚠ No Phone</span>}
                  </div>
                </div>

                {/* Template selector */}
                <div style={{ marginBottom:14 }}>
                  <label style={lStyle}>Message Template</label>
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                    {[["custom","✏️ Custom"],["hearing","📅 Hearing Reminder"],["update","📋 Case Update"],["docs","📎 Request Documents"],["payment","💰 Payment Reminder"]].map(([k,label])=>(
                      <button key={k} onClick={()=>{ setMsgType(k); if(k!=="custom") setMessage(""); }}
                        style={{ padding:"7px 14px", borderRadius:20, border: msgType===k?"2px solid #0a1628":"1.5px solid #dde", background:msgType===k?"#0a1628":"#fff", color:msgType===k?"#fff":"#555", cursor:"pointer", fontSize:12, fontWeight:600, fontFamily:"inherit" }}>
                        {label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Message box */}
                <div style={{ marginBottom:16 }}>
                  <label style={lStyle}>Message</label>
                  <textarea
                    value={msgType==="custom" ? message : (templates[msgType](selected)||"")}
                    onChange={e=>{ if(msgType==="custom") setMessage(e.target.value); }}
                    readOnly={msgType!=="custom"}
                    rows={10}
                    style={{ ...iStyle, resize:"vertical", fontFamily:"inherit", lineHeight:1.7, background:msgType!=="custom"?"#f9fafb":"#fff", color:"#333" }}
                    placeholder="Type your message here…"
                  />
                </div>

                <button onClick={openWhatsApp} disabled={!selected.phone||!getMsg().trim()}
                  style={{ width:"100%", padding:"14px", background:selected.phone&&getMsg().trim()?"#25D366":"#ccc", color:"#fff", border:"none", borderRadius:12, fontSize:16, fontWeight:700, cursor:selected.phone?"pointer":"not-allowed", fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center", gap:10 }}>
                  <span style={{ fontSize:22 }}>📲</span> Open in WhatsApp
                </button>
                {!selected.phone && <p style={{ textAlign:"center", color:"#e53935", fontSize:12, marginTop:8 }}>⚠ This client has no phone number on file. Edit the client record to add one.</p>}
              </div>
            </>
          ) : (
            <div style={{ background:"#fff", borderRadius:14, padding:60, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #eef0f5", textAlign:"center" }}>
              <div style={{ fontSize:60, marginBottom:16 }}>💬</div>
              <h3 style={{ fontFamily:"Georgia,serif", color:"#0a1628", marginBottom:8 }}>Select a Client</h3>
              <p style={{ color:"#aaa", fontSize:14 }}>Choose a client from the list to compose and send a WhatsApp message.</p>
            </div>
          )}

          {/* Sent log */}
          {sent.length > 0 && (
            <div style={{ background:"#fff", borderRadius:14, padding:20, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #eef0f5" }}>
              <h4 style={{ color:"#0a1628", fontSize:14, fontWeight:700, marginBottom:14 }}>📜 Recent Messages (This Session)</h4>
              {sent.slice(0,5).map((s,i)=>(
                <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"9px 0", borderBottom: i<sent.slice(0,5).length-1?"1px solid #f5f5f5":"none" }}>
                  <div>
                    <div style={{ fontSize:13, fontWeight:600, color:"#0a1628" }}>{s.name}</div>
                    <div style={{ fontSize:11, color:"#aaa" }}>{s.phone} · {s.msg.slice(0,40)}…</div>
                  </div>
                  <div style={{ textAlign:"right", flexShrink:0 }}>
                    <div style={{ fontSize:11, color:"#2e7d32", fontWeight:700 }}>✓ Opened</div>
                    <div style={{ fontSize:10, color:"#bbb" }}>{s.date} {s.time}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── REPORTS TAB ──────────────────────────────────────────────────────────────
function ReportsTab({ cases, clients }) {
  const [reportType, setReportType] = useState("overview");
  const [dateFrom,   setDateFrom]   = useState("2024-01-01");
  const [dateTo,     setDateTo]     = useState(new Date().toISOString().split("T")[0]);

  const filtered = cases.filter(c => c.openedDate >= dateFrom && c.openedDate <= dateTo);

  const totalCases      = filtered.length;
  const activeCases     = filtered.filter(c=>c.status==="Active").length;
  const closedCases     = filtered.filter(c=>c.status==="Closed").length;
  const onHoldCases     = filtered.filter(c=>c.status==="On Hold").length;
  const highPriority    = filtered.filter(c=>c.priority==="High").length;
  const totalClients    = clients.length;
  const activeClients   = clients.filter(c=>c.status==="Active").length;
  const corporateClients= clients.filter(c=>c.type==="Corporate").length;

  const byType = CASE_TYPES.map(t=>({ t, n: filtered.filter(c=>c.type===t).length })).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  const byAdvocate = ["Judy Mwangi","Peter Odhiambo","Grace Akinyi","Samuel Kariuki"].map(a=>({
    a, total: filtered.filter(c=>c.assignedTo===a).length,
    active: filtered.filter(c=>c.assignedTo===a&&c.status==="Active").length,
    closed: filtered.filter(c=>c.assignedTo===a&&c.status==="Closed").length,
  })).sort((a,b)=>b.total-a.total);

  const upcomingHearings = cases.filter(c=>c.nextHearing&&c.nextHearing>=new Date().toISOString().split("T")[0]&&c.status==="Active").sort((a,b)=>a.nextHearing.localeCompare(b.nextHearing));

  const printReport = () => window.print();

  const statBox = (icon, label, value, color, sub="") => (
    <div style={{ background:"#fff", borderRadius:12, padding:"18px 20px", boxShadow:"0 2px 10px rgba(0,0,0,0.06)", borderLeft:`4px solid ${color}`, display:"flex", alignItems:"center", gap:14 }}>
      <div style={{ width:42, height:42, background:color+"18", borderRadius:11, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>{icon}</div>
      <div>
        <div style={{ fontSize:26, fontWeight:800, color:"#0a1628", lineHeight:1 }}>{value}</div>
        <div style={{ fontSize:11, fontWeight:600, color:"#777", marginTop:3 }}>{label}</div>
        {sub && <div style={{ fontSize:10, color:color, fontWeight:700, marginTop:2 }}>{sub}</div>}
      </div>
    </div>
  );

  return (
    <div className="page-pad" style={{ padding:28 }}>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20, flexWrap:"wrap", gap:12 }} className="top-bar">
        <div>
          <h2 style={{ fontFamily:"Georgia,serif", fontSize:22, color:"#0a1628", margin:0 }}>📊 Reports & Analytics</h2>
          <p style={{ color:"#888", fontSize:13, margin:"4px 0 0" }}>Firm performance, case statistics and hearing schedules</p>
        </div>
        <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }} className="top-bar-right report-actions">
          <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{ ...iStyle, width:"auto", padding:"8px 12px", fontSize:13 }} />
          <span style={{ color:"#888", fontSize:13 }}>to</span>
          <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{ ...iStyle, width:"auto", padding:"8px 12px", fontSize:13 }} />
          <button onClick={printReport} style={{ padding:"9px 18px", background:"#0a1628", color:"#fff", border:"none", borderRadius:10, fontWeight:700, cursor:"pointer", fontSize:13, fontFamily:"inherit", whiteSpace:"nowrap" }}>🖨 Print Report</button>
        </div>
      </div>

      {/* Report type tabs */}
      <div style={{ display:"flex", gap:8, marginBottom:22, flexWrap:"wrap" }}>
        {[["overview","📋 Overview"],["cases","⚖️ Cases"],["clients","👥 Clients"],["hearings","📅 Hearings"],["advocates","👩‍⚖️ Advocates"]].map(([k,label])=>(
          <button key={k} onClick={()=>setReportType(k)}
            style={{ padding:"8px 18px", borderRadius:20, border:reportType===k?"none":"1.5px solid #dde", background:reportType===k?"#0a1628":"#fff", color:reportType===k?"#fff":"#555", cursor:"pointer", fontSize:13, fontWeight:600, fontFamily:"inherit" }}>
            {label}
          </button>
        ))}
      </div>

      {/* ── OVERVIEW ── */}
      {reportType==="overview" && (
        <div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))", gap:14, marginBottom:22 }} className="stat-grid">
            {statBox("📁","Total Cases",totalCases,"#c8a96e",`In period ${dateFrom} – ${dateTo}`)}
            {statBox("🟢","Active Cases",activeCases,"#2e7d32",`${totalCases?Math.round(activeCases/totalCases*100):0}% of total`)}
            {statBox("🔒","Closed Cases",closedCases,"#c62828",`${totalCases?Math.round(closedCases/totalCases*100):0}% resolved`)}
            {statBox("⏸","On Hold",onHoldCases,"#f57f17","")}
            {statBox("🔴","High Priority",highPriority,"#e53935","")}
            {statBox("👥","Total Clients",totalClients,"#1565c0",`${activeClients} active`)}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }} className="dash-grid">
            <div style={{ background:"#fff", borderRadius:14, padding:22, boxShadow:"0 2px 12px rgba(0,0,0,0.06)" }}>
              <h3 style={{ margin:"0 0 16px", color:"#0a1628", fontSize:15, fontWeight:700 }}>⚖️ Cases by Practice Area</h3>
              {byType.length===0 ? <p style={{ color:"#bbb" }}>No data in range</p> : byType.map(({t,n})=>(
                <div key={t} style={{ marginBottom:12 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4 }}>
                    <span style={{ color:"#555" }}>{t}</span>
                    <span style={{ fontWeight:700, color:"#0a1628" }}>{n} <span style={{ color:"#aaa", fontWeight:400 }}>({totalCases?Math.round(n/totalCases*100):0}%)</span></span>
                  </div>
                  <div style={{ background:"#f0f0f0", borderRadius:6, height:8 }}>
                    <div style={{ background:"#c8a96e", width:`${totalCases?(n/totalCases*100):0}%`, height:8, borderRadius:6, transition:"width .4s" }} />
                  </div>
                </div>
              ))}
            </div>
            <div style={{ background:"#fff", borderRadius:14, padding:22, boxShadow:"0 2px 12px rgba(0,0,0,0.06)" }}>
              <h3 style={{ margin:"0 0 16px", color:"#0a1628", fontSize:15, fontWeight:700 }}>👥 Client Breakdown</h3>
              {[
                ["Individual Clients", clients.filter(c=>c.type==="Individual").length, "#1565c0"],
                ["Corporate Clients",  corporateClients, "#c8a96e"],
                ["Active Clients",     activeClients, "#2e7d32"],
                ["Inactive Clients",   clients.filter(c=>c.status==="Inactive").length, "#aaa"],
              ].map(([label,val,color])=>(
                <div key={label} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:"1px solid #f5f5f5" }}>
                  <span style={{ fontSize:13, color:"#555" }}>{label}</span>
                  <span style={{ fontSize:18, fontWeight:800, color }}>{val}</span>
                </div>
              ))}
              <div style={{ marginTop:16 }}>
                <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>Client Type Distribution</div>
                <div style={{ display:"flex", borderRadius:8, overflow:"hidden", height:14 }}>
                  <div style={{ width:`${clients.length?Math.round(clients.filter(c=>c.type==="Individual").length/clients.length*100):50}%`, background:"#1565c0" }} />
                  <div style={{ flex:1, background:"#c8a96e" }} />
                </div>
                <div style={{ display:"flex", gap:16, marginTop:6, fontSize:11, color:"#888" }}>
                  <span>🔵 Individual</span><span>🟡 Corporate</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── CASES REPORT ── */}
      {reportType==="cases" && (
        <div style={{ background:"#fff", borderRadius:14, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", overflow:"hidden" }}>
          <div style={{ padding:"16px 20px", background:"#0a1628", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <h3 style={{ margin:0, color:"#fff", fontFamily:"Georgia,serif", fontSize:16 }}>Case Register ({filtered.length} records)</h3>
            <span style={{ fontSize:12, color:"#8a9ab5" }}>{dateFrom} – {dateTo}</span>
          </div>
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
              <thead>
                <tr style={{ background:"#f7f9fc", borderBottom:"2px solid #eef0f5" }}>
                  {["Case ID","Title","Client","Type","Status","Priority","Advocate","Opened"].map(h=>(
                    <th key={h} style={{ padding:"10px 14px", textAlign:"left", color:"#555", fontWeight:700, fontSize:11, textTransform:"uppercase", letterSpacing:0.5, whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((c,i)=>{
                  const cl = clients.find(x=>x.id===c.clientId);
                  const sm = STATUS_META[c.status]||STATUS_META["Active"];
                  return (
                    <tr key={c.id} style={{ borderBottom:"1px solid #f3f3f3", background: i%2===0?"#fff":"#fafbfd" }}>
                      <td style={{ padding:"9px 14px", fontFamily:"monospace", color:"#c8a96e", fontWeight:700, whiteSpace:"nowrap" }}>{c.id}</td>
                      <td style={{ padding:"9px 14px", color:"#0a1628", fontWeight:600, maxWidth:200, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c.title}</td>
                      <td style={{ padding:"9px 14px", color:"#555", whiteSpace:"nowrap" }}>{cl?.name||"—"}</td>
                      <td style={{ padding:"9px 14px", color:"#666", whiteSpace:"nowrap" }}>{c.type}</td>
                      <td style={{ padding:"9px 14px" }}><span style={{ background:sm.bg, color:sm.color, padding:"2px 10px", borderRadius:20, fontWeight:700, fontSize:11, whiteSpace:"nowrap" }}>{c.status}</span></td>
                      <td style={{ padding:"9px 14px", color: c.priority==="High"?"#c62828":c.priority==="Medium"?"#e65100":"#2e7d32", fontWeight:700 }}>{c.priority}</td>
                      <td style={{ padding:"9px 14px", color:"#555", whiteSpace:"nowrap" }}>{c.assignedTo}</td>
                      <td style={{ padding:"9px 14px", color:"#888", whiteSpace:"nowrap" }}>{c.openedDate}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── CLIENTS REPORT ── */}
      {reportType==="clients" && (
        <div style={{ background:"#fff", borderRadius:14, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", overflow:"hidden" }}>
          <div style={{ padding:"16px 20px", background:"#0a1628", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <h3 style={{ margin:0, color:"#fff", fontFamily:"Georgia,serif", fontSize:16 }}>Client Register ({clients.length} records)</h3>
          </div>
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
              <thead>
                <tr style={{ background:"#f7f9fc", borderBottom:"2px solid #eef0f5" }}>
                  {["ID","Name","Type","Phone","Email","Address","Status","Cases"].map(h=>(
                    <th key={h} style={{ padding:"10px 14px", textAlign:"left", color:"#555", fontWeight:700, fontSize:11, textTransform:"uppercase", letterSpacing:0.5, whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {clients.map((c,i)=>{
                  const cc = cases.filter(x=>x.clientId===c.id);
                  return (
                    <tr key={c.id} style={{ borderBottom:"1px solid #f3f3f3", background:i%2===0?"#fff":"#fafbfd" }}>
                      <td style={{ padding:"9px 14px", fontFamily:"monospace", color:"#c8a96e", fontWeight:700 }}>{c.id}</td>
                      <td style={{ padding:"9px 14px", color:"#0a1628", fontWeight:600, whiteSpace:"nowrap" }}>{c.name}</td>
                      <td style={{ padding:"9px 14px", color:"#666" }}>{c.type}</td>
                      <td style={{ padding:"9px 14px", color:"#555", whiteSpace:"nowrap" }}>{c.phone||"—"}</td>
                      <td style={{ padding:"9px 14px", color:"#555", maxWidth:160, overflow:"hidden", textOverflow:"ellipsis" }}>{c.email||"—"}</td>
                      <td style={{ padding:"9px 14px", color:"#777", whiteSpace:"nowrap" }}>{c.address||"—"}</td>
                      <td style={{ padding:"9px 14px" }}><span style={{ background:c.status==="Active"?"#e8f5e9":"#f3f3f3", color:c.status==="Active"?"#2e7d32":"#888", padding:"2px 10px", borderRadius:20, fontWeight:700, fontSize:11 }}>{c.status}</span></td>
                      <td style={{ padding:"9px 14px", textAlign:"center", fontWeight:700, color:"#0a1628" }}>{cc.length}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── HEARINGS REPORT ── */}
      {reportType==="hearings" && (
        <div style={{ background:"#fff", borderRadius:14, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", overflow:"hidden" }}>
          <div style={{ padding:"16px 20px", background:"#0a1628", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <h3 style={{ margin:0, color:"#fff", fontFamily:"Georgia,serif", fontSize:16 }}>Upcoming Hearings Schedule ({upcomingHearings.length})</h3>
          </div>
          {upcomingHearings.length===0
            ? <div style={{ padding:40, textAlign:"center", color:"#bbb" }}>No upcoming hearings found.</div>
            : <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                  <thead>
                    <tr style={{ background:"#f7f9fc", borderBottom:"2px solid #eef0f5" }}>
                      {["Hearing Date","Case ID","Title","Client","Court","Advocate","Priority"].map(h=>(
                        <th key={h} style={{ padding:"10px 14px", textAlign:"left", color:"#555", fontWeight:700, fontSize:11, textTransform:"uppercase", letterSpacing:0.5, whiteSpace:"nowrap" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {upcomingHearings.map((c,i)=>{
                      const cl = clients.find(x=>x.id===c.clientId);
                      return (
                        <tr key={c.id} style={{ borderBottom:"1px solid #f3f3f3", background:i%2===0?"#fff":"#fffdf0" }}>
                          <td style={{ padding:"9px 14px", fontWeight:800, color:"#a07840", whiteSpace:"nowrap" }}>{c.nextHearing}</td>
                          <td style={{ padding:"9px 14px", fontFamily:"monospace", color:"#c8a96e", fontWeight:700, whiteSpace:"nowrap" }}>{c.id}</td>
                          <td style={{ padding:"9px 14px", color:"#0a1628", fontWeight:600, maxWidth:200, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c.title}</td>
                          <td style={{ padding:"9px 14px", color:"#555", whiteSpace:"nowrap" }}>{cl?.name||"—"}</td>
                          <td style={{ padding:"9px 14px", color:"#666", whiteSpace:"nowrap" }}>{c.court}</td>
                          <td style={{ padding:"9px 14px", color:"#555", whiteSpace:"nowrap" }}>{c.assignedTo}</td>
                          <td style={{ padding:"9px 14px", fontWeight:700, color:c.priority==="High"?"#c62828":c.priority==="Medium"?"#e65100":"#2e7d32" }}>{c.priority}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>}
        </div>
      )}

      {/* ── ADVOCATES REPORT ── */}
      {reportType==="advocates" && (
        <div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))", gap:16, marginBottom:22 }} className="stat-grid">
            {byAdvocate.map(({a,total,active,closed})=>(
              <div key={a} style={{ background:"#fff", borderRadius:14, padding:20, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #eef0f5" }}>
                <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:14 }}>
                  <div style={{ width:42, height:42, borderRadius:"50%", background:"#0a1628", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, fontWeight:800, color:"#c8a96e" }}>
                    {a.split(" ").map(w=>w[0]).join("")}
                  </div>
                  <div>
                    <div style={{ fontWeight:700, color:"#0a1628", fontSize:14 }}>{a}</div>
                    <div style={{ fontSize:11, color:"#888" }}>{ADVOCATES.indexOf(a)===0?"Senior Partner":"Associate Advocate"}</div>
                  </div>
                </div>
                {[["Total Cases",total,"#0a1628"],["Active",active,"#2e7d32"],["Closed",closed,"#c62828"]].map(([l,v,c])=>(
                  <div key={l} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:"1px solid #f5f5f5" }}>
                    <span style={{ fontSize:12, color:"#666" }}>{l}</span>
                    <span style={{ fontSize:14, fontWeight:800, color:c }}>{v}</span>
                  </div>
                ))}
                <div style={{ marginTop:12 }}>
                  <div style={{ background:"#f0f0f0", borderRadius:6, height:7 }}>
                    <div style={{ background:"#c8a96e", width:`${totalCases?(total/totalCases*100):0}%`, height:7, borderRadius:6 }} />
                  </div>
                  <div style={{ fontSize:11, color:"#aaa", marginTop:4 }}>{totalCases?Math.round(total/totalCases*100):0}% of firm caseload</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Print styles */}
      <style>{`
        @media print {
          .mobile-bottom-nav, header, .no-print { display:none !important; }
          body { background:#fff; }
          table { font-size:10px; }
          th, td { padding:6px 10px !important; }
        }
      `}</style>
    </div>
  );
}

function App() {
  const [user,    setUser]    = useState(null);
  const [tab,     setTab]     = useState("Dashboard");
  const [search,  setSearch]  = useState("");
  const [cases,   setCases]   = useState(INIT_CASES);
  const [clients, setClients] = useState(INIT_CLIENTS);

  if (!user) return <Login onLogin={setUser} />;

  return (
    <div style={{ minHeight:"100vh", background:"#f2f4f8", fontFamily:"'Segoe UI',sans-serif" }}>
      <Header tab={tab} setTab={t=>{setTab(t);setSearch("");}} search={search} setSearch={setSearch} user={user} onLogout={()=>{setUser(null);setTab("Dashboard");setSearch("");}} />
      <div style={{ padding:"5px 26px", background:"#fff", borderBottom:"1px solid #eef0f5", display:"flex", alignItems:"center", gap:8 }}>
        <div style={{ width:7, height:7, borderRadius:"50%", background:"#2e7d32", flexShrink:0 }} />
        <span style={{ fontSize:12, color:"#888" }}>
          Signed in as <strong style={{ color:"#0a1628" }}>{user.name}</strong> · {user.role} · {new Date().toLocaleDateString("en-KE",{ weekday:"long", year:"numeric", month:"long", day:"numeric" })}
        </span>
      </div>
      <div className="main-content">
        {tab==="Dashboard" && <Dashboard    cases={cases}   clients={clients} />}
        {tab==="Cases"     && <CasesTab     cases={cases}   setCases={setCases}   clients={clients}  globalSearch={search} />}
        {tab==="Clients"   && <ClientsTab   clients={clients} setClients={setClients} cases={cases}  globalSearch={search} />}
        {tab==="Reports"   && <ReportsTab   cases={cases}   clients={clients} />}
        {tab==="WhatsApp"  && <WhatsAppTab  clients={clients} cases={cases} />}
      </div>
      <footer style={{ textAlign:"center", padding:20, color:"#bbb", fontSize:12, borderTop:"1px solid #e8e8e8", background:"#fff", marginTop:40 }}>
        Judy & Associates Advocates · Nairobi, Kenya · Case Management System © {new Date().getFullYear()}
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
